# Controlled dependency maintenance.
#
# The shape below is chosen to make updates *reviewable*, not merely to make them exist:
#   - monthly, not weekly — a PR stream nobody reads is the same as no PRs, minus the quiet;
#   - grouped minor+patch, one PR per ecosystem — the routine, boring bump;
#   - majors ungrouped and unignored — each arrives as its own PR, because a major is a
#     behavior change that deserves the review a group would hide it inside of;
#   - low limits — a hard ceiling on how much of the queue this can ever occupy.
#
# Enabling Dependabot *security* updates is a separate repository setting, not committable
# here. Every Dependabot PR takes the normal path: required checks, then merge. Nothing
# auto-merges.
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: [dependencies, area:engine]
    groups:
      cargo-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /clients/web
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: [dependencies, area:client]
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]

  # Dependabot understands a SHA-pinned `uses:` with a version comment and updates both
  # together, so pinning does not cost us Action updates — it only means the diff shows a
  # new SHA next to a new tag, which is exactly what a reviewer should be looking at.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: [dependencies, area:ci]
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]
