name: Agent task
description: A scoped unit of work sized for one pull request
labels: [agent-task]
body:
  - type: input
    id: goal
    attributes:
      label: Goal
      description: One sentence. What exists after this task that does not exist now?
      placeholder: rune-protocol serializes GameView to/from JSON with serde
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [engine, protocol, server, cli, client, docs, ci]
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checkable statements. CI-verifiable wherever possible.
      placeholder: |
        - [ ] `GameView` round-trips through serde_json in a unit test
        - [ ] docs/protocol.md field table matches the struct
        - [ ] `make check` green
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: In scope / out of scope
      description: Files or areas expected to change, and what must NOT change.
      placeholder: |
        In: crates/rune-protocol, docs/protocol.md
        Out: engine internals, client
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context and references
      placeholder: docs/brief.md "The API", docs/decisions/0004
