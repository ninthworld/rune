name: AI Review Prepare

# STAGE 1 of ADR 0015's two-stage split — the UNTRUSTED half.
#
# This job sees pull-request-controlled file content. That is safe for exactly one reason: it
# holds nothing worth stealing. Read-only token, **no secrets of any kind**, and it publishes
# nothing. If a pull request could somehow run code here, the most it would gain is the ability
# to lie in an artifact that the trusted stage hashes, bounds, and then treats as untrusted text
# anyway.
#
# `pull_request_target` is NOT used, and cannot be: it would run with a read-write token and the
# repository's secrets in the base context while checking out the PR head, which is the standard
# secret-exfiltration path this design exists to eliminate. `make ci-lint` (#199) rejects it.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# No write scope, anywhere. This is the whole security posture of stage 1.
permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # The BASE ref, not the head: this checkout is where the prepare *code* and the constraint
      # documents come from. A pull request that edited `tools/ai-review/` or `AGENTS.md` must
      # not get to run the edited version against itself, or rewrite the rules it is about to be
      # judged by. `persist-credentials: false` because nothing here should ever push.
      - name: Checkout base (trusted)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          # Full history. `collectDiff` runs `git diff base...head`, a three-dot diff, which needs
          # the **merge base** — and a shallow clone frequently does not contain it (a branch that
          # has fallen behind `main`, or a long-lived one). Shallow would make prepare hard-fail on
          # exactly the pull requests most worth reviewing, and a failed prepare is now a red
          # required check. Depth is not worth that.
          fetch-depth: 0
          persist-credentials: false

      # Fetch the head's *objects* — not a working tree, and nothing is checked out from them.
      # `pull/N/head` exists on the base repository, so this works for fork PRs without ever
      # adding the fork as a remote. Values arrive via env, never interpolated into the shell:
      # a branch name is attacker-controlled, and `${{ }}` is substituted before the shell parses
      # the line, so interpolating one is script injection (the rule `make ci-lint` enforces).
      - name: Fetch head objects (data only)
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git -c core.hooksPath=/dev/null fetch --no-tags origin \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/pr/head"
          git -c core.hooksPath=/dev/null fetch --no-tags origin "${PR_BASE_SHA}"

      # Node is preinstalled on the runner. NOTHING from the pull request is executed: no `make`,
      # no cargo, no `npm ci`, no scripts, no hooks, no binaries. `prepare.js` runs `git diff`
      # (with hooks and attribute drivers disabled, since a head `.gitattributes` can name a
      # textconv driver that git would otherwise run) and reads files as bytes.
      - name: Build the review input
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node tools/ai-review/prepare.js ai-review-input

      - name: Upload the prepared input
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ai-review-input
          path: ai-review-input/
          retention-days: 7
          if-no-files-found: error
