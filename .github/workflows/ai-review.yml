name: AI Review

# STAGE 2 of ADR 0015's two-stage split — the TRUSTED half.
#
# This is the job that holds the model credential and a `pull-requests: write` token, so it is
# the job that must never touch pull-request-controlled code. It does not check out the head. It
# does not build, install, or import anything from the head. What it consumes is a bounded JSON
# artifact produced by the prepare run, whose hash and provenance it verifies before reading —
# and which it then treats as untrusted *text*, because that is what it is.
#
# `workflow_run` is what makes this possible: it runs in the base-repository context, from the
# base branch's own workflow definition, after the untrusted job has finished. The alternative,
# `pull_request_target`, would put the secrets and the untrusted checkout in one job — the exact
# arrangement ADR 0015 rejects and `make ci-lint` now refuses to let anyone reintroduce.
on:
  workflow_run:
    workflows: ["AI Review Prepare"]
    types: [completed]

jobs:
  # A failed *prepare* run would otherwise produce no check at all: the review job below is
  # skipped by its own `if:`, and a skipped job posts nothing. `AI Review` is a REQUIRED check, so
  # "nothing" leaves the pull request permanently **pending** — unmergeable, with no signal, which
  # is strictly worse than red. Somebody has to publish the failure, so this job does.
  report-prepare-failure:
    name: AI Review (prepare failed)
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion != 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.repository.full_name == github.repository
    permissions:
      checks: write # publish the failing `AI Review` check run; nothing else is needed
    steps:
      - name: Publish a failing check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/check-runs" -X POST \
            -f name='AI Review' \
            -f head_sha="${HEAD_SHA}" \
            -f status=completed \
            -f conclusion=failure \
            -f 'output[title]=AI Review did not complete' \
            -f "output[summary]=**Infrastructure failure — the review did not run.** The *AI Review Prepare* run did not succeed (see ${RUN_URL}), so no review input was ever produced. This is *not* a clean review: nothing was reviewed. Fix the cause and re-run the prepare workflow."

  review:
    name: AI Review
    runs-on: ubuntu-latest
    # Must cover what LIMITS actually allows: 3 model calls x 7 minutes, plus backoff, plus the
    # checkout and the CLI install. A job timeout shorter than the retries it permits would kill
    # a review mid-flight and report an outage that was really a budget we set wrong.
    timeout-minutes: 25
    # Belt and braces: `verify.js` re-checks every one of these against the payload and refuses
    # the artifact if any disagrees. This condition just avoids spending a runner on a run that
    # is already disqualified.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.repository.full_name == github.repository
    permissions:
      contents: read # check out THIS repository's trusted base implementation — never the PR head
      actions: read # download the prepare run's artifact
      pull-requests: write # post the non-approving COMMENT review
      checks: write # create the `AI Review` check run
    steps:
      # The default ref for a `workflow_run` event is the default branch, which is precisely what
      # we want: the reviewer's own code, from `main`, reviewed by humans before it got there.
      - name: Checkout trusted base
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      # The artifact from the *prepare* run, fetched by run id. It lands as two inert files.
      - name: Download the prepared input
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ai-review-input
          path: ai-review-input
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # The default provider is the Claude Code CLI, because that is what a Pro/Max subscription
      # can authenticate (`claude setup-token` → CLAUDE_CODE_OAUTH_TOKEN) — the metered API would
      # bill per token for a review the subscription already covers.
      #
      # Pinned. This is a *global* install of a published package, not an install of anything from
      # the pull request — the workspace is never installed from, and the artifact is inert JSON.
      # The version is pinned in `tools/ai-review/config.js` and asserted here so a silent upgrade
      # of the harness that enforces `--disallowed-tools` cannot arrive without a reviewable diff.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
      - name: Install the pinned reviewer CLI
        run: npm install --global --no-fund --no-audit "@anthropic-ai/claude-code@2.1.207"

      # The model credential exists only in this step, in this stage — and `cli.js` does not pass
      # it on: the CLI subprocess gets an environment allowlist (PATH, a scratch HOME, its own
      # token) with no GITHUB_TOKEN in it, so even a tool that escaped its denylist would have no
      # credential to push with. `WORKFLOW_RUN_JSON` carries the event payload through the
      # environment rather than through `${{ }}` interpolation into a shell — the payload contains
      # attacker-controlled strings (a branch name, a PR title).
      - name: Review
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_JSON: ${{ toJSON(github.event.workflow_run) }}
          RUNE_REVIEW_PROVIDER: ${{ vars.RUNE_REVIEW_PROVIDER || 'claude' }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node tools/ai-review/cli.js ai-review-input

      # `AI Review` is a REQUIRED check, and the check run only exists because `cli.js` creates
      # it — this job's own check is attached to the default branch, not to the PR head. So any
      # failure *before* that node process publishes (a failed checkout, a transient
      # download-artifact, an artifact aged past its retention, a runner dying, a bad npm install)
      # would leave the PR with no `AI Review` check at all: permanently **pending**, which is
      # strictly worse than red. A check that never reports blocks the merge while looking like it
      # is merely still running — the exact "a skipped review is indistinguishable from a passing
      # one" failure this design exists to eliminate, wearing a different hat.
      #
      # So: if anything failed, guarantee a red check. It only posts when one is not already there,
      # so `cli.js`'s own detailed failure summary is never overwritten by this generic one.
      # `always()`, not `failure()`: a job that is **cancelled or times out** does not run
      # `failure()` steps — and those are precisely the cases that would otherwise leave the
      # required check hanging pending forever. The guard below makes this a no-op whenever a
      # check already reports, so a successful review is never overwritten by this generic one.
      - name: Guarantee a check run even if the job died before publishing
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          existing=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/check-runs" \
            --jq '[.check_runs[] | select(.name == "AI Review" and .status == "completed")] | length')
          if [ "${existing}" -gt 0 ]; then
            echo "an AI Review check already reports on ${HEAD_SHA} — leaving its summary alone"
            exit 0
          fi
          gh api "repos/${GITHUB_REPOSITORY}/check-runs" -X POST \
            -f name='AI Review' \
            -f head_sha="${HEAD_SHA}" \
            -f status=completed \
            -f conclusion=failure \
            -f 'output[title]=AI Review did not complete' \
            -f "output[summary]=**Infrastructure failure — the review did not run.** The review job failed before it could publish a result (see ${RUN_URL}). This is *not* a clean review: nothing was reviewed. Re-run the job once the cause is fixed."
