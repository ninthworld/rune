name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: deny-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Install a prebuilt cargo-deny, then run it through `make deny` so the set of
      # checks (advisories licenses bans sources) lives only in the Makefile and CI
      # cannot drift from the local `make verify` gate.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Deny check
        run: make deny
