name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: deny-${{ github.ref }}
  cancel-in-progress: true

# Supply-chain gates only read the tree they audit.
permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Prebuilt binaries, then both gates run through the Makefile so the set of checks
      # lives only there and CI cannot drift from the local `make verify`.
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-deny
      - name: Deny check
        run: make deny
