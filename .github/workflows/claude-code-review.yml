name: Claude Code Review

# The interim AI reviewer (ADR 0015). It is deliberately NOT a required check, so a skipped
# run is indistinguishable from a clean one — which is why `scripts/agent-task report`
# *observes* whether it actually ran. #202 replaces this workflow with ADR 0015's two-stage
# design (a Prepare job with no secrets, and a Review job that never checks out PR code).
#
# Known residual risk, recorded here rather than papered over (#199): this job checks the PR
# out *and* holds a model credential, which is the coupling ADR 0015 exists to break. It is
# tolerable only because `pull_request` withholds secrets from fork PRs — so on the untrusted
# input this could not defend against, the job gets no secret to leak and no-ops — and because
# same-repo branches here are created by the runner, not by strangers. It stops being
# tolerable the moment this repository accepts fork PRs that should be AI-reviewed. That is
# #202's job, not this PR's.
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write # OIDC: how claude-code-action authenticates to Anthropic without a long-lived key
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The action skips bot-triggered runs unless the bot is allowlisted, which would
          # silently disable review on exactly the PRs it exists to review. Named explicitly
          # rather than '*' so no other bot can trigger a review run.
          #   rune-agent[bot] — every agent PR (docs/agents/workflow.md).
          #   dependabot[bot] — dependency PRs get the same review path as any other change
          #                     (#199). Note it only produces a review if the maintainer has
          #                     also added CLAUDE_CODE_OAUTH_TOKEN as a *Dependabot* secret:
          #                     Dependabot-triggered runs cannot read Actions secrets.
          allowed_bots: 'rune-agent[bot],dependabot[bot]'
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
