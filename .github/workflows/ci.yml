name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  client:
    name: Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    # The unit gate never needs a browser; skip Playwright's browser download on
    # install so the fast Client job stays browser-free (browsers live in the E2E job).
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Audit
        # Fail on new high/critical advisories. Accepted findings are pinned via
        # package.json "overrides"; threshold documented in clients/web/AGENTS.md.
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    # Separate from `make check` (the Engine + Client jobs) per ADR 0011: the
    # browser suite needs a real browser and a built-and-served client, so it runs
    # as its own job rather than slowing the fast unit gate. Required for the M1
    # exit criterion but governed independently.
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: clients/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck e2e
        run: npm run e2e:typecheck
      # Install only the pinned Chromium (+OS deps). On a runner image that already
      # ships this Chromium revision this is a fast no-op; it never fetches a matrix.
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run e2e
        run: npm run e2e
      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: clients/web/playwright-report/
          retention-days: 7
